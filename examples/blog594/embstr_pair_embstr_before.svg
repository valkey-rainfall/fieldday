<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 818 262" width="818" height="262">
<style>
  .fd-background      { fill: var(--fd-background, #ffffff); }
  .fd-title   { fill: var(--fd-text, #002a3a); }
  .fd-field-box   { fill: var(--fd-field-fill, #6983ff); stroke: var(--fd-field-border, #30176e); stroke-width: 1; }
  .fd-padding-box     { fill: url(#fd-hatch); stroke: var(--fd-padding-stroke, #b9c2cc); stroke-width: 1; }
  .fd-flexible-array    { fill: none; stroke: var(--fd-muted, #666666); stroke-width: 1; stroke-dasharray: 4 3; }
  .fd-extra-box   { fill: var(--fd-field-fill, #6983ff); fill-opacity: 0.55; stroke: var(--fd-field-border, #30176e); stroke-width: 1; stroke-dasharray: 5 3; }
  .fd-allocation-plus    { fill: var(--fd-muted, #666666); }
  .fd-field-label   { fill: var(--fd-field-text, #ffffff); }
  .fd-padding-label  { fill: var(--fd-muted, #666666); }
  .fd-callout-label { fill: var(--fd-text, #002a3a); }
  .fd-leader-line  { stroke: var(--fd-muted, #666666); stroke-width: 1; fill: none; }
  .fd-ruler-line   { stroke: var(--fd-muted, #666666); stroke-width: 1; }
  .fd-cache-line   { stroke: var(--fd-text, #002a3a); stroke-width: 3; stroke-dasharray: 7 4; opacity: 0.8; }
  .fd-cache-line-label    { fill: var(--fd-text, #002a3a); }
  .fd-pointer-arrow  { stroke: var(--fd-text, #002a3a); stroke-width: 1.5; fill: none; }
  .fd-pointer-head   { fill: var(--fd-text, #002a3a); }
  .fd-ruler-label    { fill: var(--fd-muted, #666666); }
  .fd-note  { fill: var(--fd-highlight, #1e8e3e); }
  .fd-note-plain { fill: var(--fd-text, #002a3a); }
  text        { font-family: var(--fd-font, 'Fira Mono', Consolas, Menlo, Monaco, 'Courier New', monospace); }
  .fd-hatch-background { fill: var(--fd-padding-fill, #f5f7f7); }
  .fd-hatch-lines { stroke: var(--fd-padding-stroke, #b9c2cc); stroke-width: 1.5; }
  .fd-subdivision-line  { stroke: var(--fd-field-text, #ffffff); stroke-width: 1; stroke-dasharray: 2 3; opacity: 0.45; }
</style>
<rect class="fd-background" width="100%" height="100%" rx="8"/>
