<style>
  .fd-bg      { fill: var(--fd-bg, #1a1a2e); }
  .fd-title   { fill: var(--fd-text, #e0e0e0); }
  .fd-field   { fill: var(--fd-field, #7fb3e0); stroke: var(--fd-border, #444444); stroke-width: 1; }
  .fd-pad     { fill: url(#fd-hatch); stroke: var(--fd-pad-stroke, #555568); stroke-width: 1; }
  .fd-flex    { fill: none; stroke: var(--fd-muted, #8a8a9a); stroke-width: 1; stroke-dasharray: 4 3; }
  .fd-label   { fill: var(--fd-field-text, #16213e); }
  .fd-padlbl  { fill: var(--fd-muted, #8a8a9a); }
  .fd-callout { fill: var(--fd-text, #e0e0e0); }
  .fd-leader  { stroke: var(--fd-muted, #8a8a9a); stroke-width: 1; fill: none; }
  .fd-ruler   { stroke: var(--fd-muted, #8a8a9a); stroke-width: 1; }
  .fd-rlbl    { fill: var(--fd-muted, #8a8a9a); }
  .fd-accent  { fill: var(--fd-accent, #e0b97f); }
  text        { font-family: var(--fd-font, ui-monospace, SFMono-Regular, 'Cascadia Code', monospace); }
  .fd-hatchbg { fill: var(--fd-pad, #2a2a3e); }
  .fd-hatchln { stroke: var(--fd-pad-stroke, #555568); stroke-width: 1.5; }
</style>
