<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 668 204" style="width:100%;max-width:668px;height:auto">
<style>
  .fd-bg      { fill: var(--fd-bg, #ffffff); }
  .fd-title   { fill: var(--fd-text, #002a3a); }
  .fd-field   { fill: var(--fd-field, #6983ff); stroke: var(--fd-border, #30176e); stroke-width: 1; }
  .fd-pad     { fill: url(#fd-hatch); stroke: var(--fd-pad-stroke, #b9c2cc); stroke-width: 1; }
  .fd-flex    { fill: none; stroke: var(--fd-muted, #666666); stroke-width: 1; stroke-dasharray: 4 3; }
  .fd-extra   { fill: var(--fd-field, #6983ff); fill-opacity: 0.55; stroke: var(--fd-border, #30176e); stroke-width: 1; stroke-dasharray: 5 3; }
  .fd-plus    { fill: var(--fd-muted, #666666); }
  .fd-label   { fill: var(--fd-field-text, #ffffff); }
  .fd-padlbl  { fill: var(--fd-muted, #666666); }
  .fd-callout { fill: var(--fd-text, #002a3a); }
  .fd-leader  { stroke: var(--fd-muted, #666666); stroke-width: 1; fill: none; }
  .fd-ruler   { stroke: var(--fd-muted, #666666); stroke-width: 1; }
  .fd-rlbl    { fill: var(--fd-muted, #666666); }
  .fd-accent  { fill: var(--fd-accent, #1e8e3e); }
  text        { font-family: var(--fd-font, 'Fira Mono', Consolas, Menlo, Monaco, 'Courier New', monospace); }
  .fd-hatchbg { fill: var(--fd-pad, #f5f7f7); }
  .fd-hatchln { stroke: var(--fd-pad-stroke, #b9c2cc); stroke-width: 1.5; }
</style>
<rect class="fd-bg" width="100%" height="100%" rx="8"/>
